{% set version = "2.3.0" %}

package:
  name: gmpy2
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/gmpy2/gmpy2-{{ version }}.tar.gz
  sha256: 2d943cc9051fcd6b15b2a09369e2f7e18c526bc04c210782e4da61b62495eb4a

build:
  number: 0
  script:
    - {{ PYTHON }} -m pip install . -vvv

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - gmp
    - mpfr
    - mpc
    - python
    - pip
    - setuptools
  run:
    - python

test:
  imports:
    - gmpy2

about:
  home: https://pypi.python.org/pypi/gmpy2
  dev_url: https://github.com/aleaxit/gmpy
  license: LGPL-3.0-or-later
  license_file:
    - COPYING
    - COPYING.LESSER
  summary: GMP/MPIR, MPFR, and MPC interface to Python

extra:
  recipe-maintainers:
    - isuruf
    - saraedum
